  </g>
  <text x="40" y="24.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Helvetica, Arial, sans-serif" font-size="21" font-weight="700" letter-spacing="-0.5" fill="#1a1f3a">Orbit</text>
</svg>
